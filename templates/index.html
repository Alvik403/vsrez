<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Консолидация Excel в шаблон</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #eef6ff 0%, #f8fbff 55%, #ffffff 100%);
            color: #10233f;
        }
        .wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 24px;
        }
        .box {
            border-radius: 16px;
            border: 1px solid #cfe1f7;
            background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
            box-shadow: 0 14px 30px rgba(33, 93, 168, 0.08);
            padding: 20px;
        }
        h1 { margin: 0; }
        h1 {
            font-size: 22px;
            color: #123c73;
            margin-bottom: 10px;
        }
        .lead {
            margin: 0 0 18px;
            font-size: 14px;
            line-height: 1.5;
            color: #4d6788;
        }
        .field {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: #5a7696;
        }
        input[type="file"] {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #c7dcf5;
            padding: 10px 12px;
            font-size: 14px;
            background: #ffffff;
            color: #10233f;
        }
        input[type="file"]::file-selector-button {
            border: 1px solid #bfd9f8;
            border-radius: 8px;
            padding: 7px 10px;
            margin-right: 8px;
            background: #eaf4ff;
            color: #1d4ed8;
            cursor: pointer;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .btn {
            border-radius: 10px;
            border: 1px solid #bfd9f8;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            color: #184a8b;
            background: #eaf4ff;
            cursor: pointer;
        }
        .btn.primary {
            background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            border-color: #2563eb;
        }
        .btn:disabled {
            cursor: default;
            opacity: 0.6;
        }
        .status {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #edf5ff;
            border: 1px solid #d4e6fb;
            font-size: 13px;
            line-height: 1.5;
            color: #355375;
            white-space: pre-wrap;
        }
        @media (max-width: 640px) {
            .wrap { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="box">
            <h1>Консолидация Excel-файлов</h1>
            <p class="lead">Загрузите исходные файлы и, при необходимости, свой шаблон или JSON-конфиг.</p>

            <form id="consolidationForm" autocomplete="off">
                <div class="field">
                    <label for="templateFile">Шаблон (.xlsx / .xlsm, необязательно)</label>
                    <input id="templateFile" name="template_file" type="file" accept=".xlsx,.xlsm">
                </div>

                <div class="field">
                    <label for="sourceFiles">Исходные файлы (.xlsx / .xlsm)</label>
                    <input id="sourceFiles" name="source_files" type="file" accept=".xlsx,.xlsm" multiple required>
                </div>

                <div class="field">
                    <label for="configFile">JSON-конфиг (необязательно)</label>
                    <input id="configFile" name="config_file" type="file" accept=".json">
                </div>

                <div class="btn-row">
                    <button id="submitBtn" class="btn primary" type="submit">Собрать итоговый Excel</button>
                    {% if has_local_test_files %}
                    <button id="testBtn" class="btn" type="button">Тест</button>
                    {% endif %}
                </div>
            </form>

            <div id="statusBox" class="status" style="display:none;"></div>
        </section>
    </div>

    <script>
        const form = document.getElementById("consolidationForm");
        const submitBtn = document.getElementById("submitBtn");
        const testBtn = document.getElementById("testBtn");
        const statusBox = document.getElementById("statusBox");

        function showStatus(message, isError) {
            statusBox.style.display = "block";
            statusBox.textContent = message;
            statusBox.style.background = isError ? "#fff1f2" : "#edf5ff";
            statusBox.style.borderColor = isError ? "#fecdd3" : "#d4e6fb";
            statusBox.style.color = isError ? "#9f1239" : "#355375";
        }

        async function downloadResponse(response) {
            const blob = await response.blob();
            const disposition = response.headers.get("content-disposition") || "";
            const match = disposition.match(/filename="?([^"]+)"?/i);
            const filename = match ? match[1] : "result.xlsx";
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement("a");
            anchor.href = url;
            anchor.download = filename;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            URL.revokeObjectURL(url);
        }

        function setButtonsDisabled(disabled) {
            submitBtn.disabled = disabled;
            if (testBtn) {
                testBtn.disabled = disabled;
            }
        }

        form.addEventListener("submit", async function (event) {
            event.preventDefault();
            setButtonsDisabled(true);
            showStatus("Обрабатываю Excel-файлы...", false);

            try {
                const formData = new FormData(form);
                const response = await fetch("/api/consolidate", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const payload = await response.json().catch(() => ({}));
                    throw new Error(payload.detail || "Не удалось собрать итоговый Excel.");
                }

                await downloadResponse(response);
                form.reset();
                showStatus("Готово. Итоговый Excel скачан.", false);
            } catch (error) {
                showStatus(error.message || "Ошибка обработки.", true);
            } finally {
                setButtonsDisabled(false);
            }
        });

        if (testBtn) {
            testBtn.addEventListener("click", async function () {
                setButtonsDisabled(true);
                showStatus("Собираю тестовый Excel по встроенным файлам...", false);

                try {
                    const response = await fetch("/api/consolidate/test", {
                        method: "POST"
                    });

                    if (!response.ok) {
                        const payload = await response.json().catch(() => ({}));
                        throw new Error(payload.detail || "Не удалось собрать тестовый Excel.");
                    }

                    await downloadResponse(response);
                    showStatus("Готово. Тестовый Excel скачан.", false);
                } catch (error) {
                    showStatus(error.message || "Ошибка обработки.", true);
                } finally {
                    setButtonsDisabled(false);
                }
            });
        }
    </script>
</body>
</html>
